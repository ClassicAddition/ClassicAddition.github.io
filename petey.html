  <section class="tribute-intro">
    <h1>Petey</h1>
    <div class="tribute-divider"><span></span><i></i><span></span></div>
    <p class="tribute-line">Rest in Peace my very best friend.</p>
  </section>

  <!-- His story: shelter listing -->
  <section class="tribute-story">
    <a href="#lb-story" class="gallery-link">
      <img src="petey-adoption.jpg" alt="Petey's shelter listing under the name Pee Wee">

      <p class="story-caption">Petey's original mugshot.</p>
      <p>Listed as &ldquo;Pee Wee,&rdquo; born September 10, 2014 &mdash; waiting for someone.
        That was me.</p>
    </div>
  </section>

  </section>

      <figcaption>One more clip of him being himself</figcaption>
    </figure>
